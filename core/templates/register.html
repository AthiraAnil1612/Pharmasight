<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | PharmaSight</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0ea5e9;       /* Medical Blue */
            --secondary: #0f172a;     /* Dark Slate */
            --accent: #14b8a6;        /* Teal Success */
            --text-main: #334155;
            --text-light: #94a3b8;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 2rem; /* Added padding for mobile spacing */
        }

        /* --- Background Effects --- */
        body::before {
            content: ''; position: absolute; top: -10%; left: -5%;
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
            animation: float 12s ease-in-out infinite;
        }

        body::after {
            content: ''; position: absolute; bottom: -10%; right: -10%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(20, 184, 166, 0.1) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
            animation: float 15s ease-in-out infinite reverse;
        }

        /* --- Glass Card --- */
        .register-container {
            width: 100%;
            max-width: 450px; /* Slightly wider than login for more fields */
            padding: 3rem 2.5rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            z-index: 10;
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }

        /* Decoration Pill */
        .register-container::before {
            content: '';
            position: absolute;
            top: -2px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 10px;
            box-shadow: 0 0 15px var(--accent);
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            display: inline-flex; align-items: center; gap: 10px;
            margin-bottom: 0.5rem;
        }

        .logo i { color: var(--accent); }

        .register-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        /* --- Form Elements --- */
        .input-group {
            position: relative;
            margin-bottom: 1.2rem;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            transition: 0.3s;
            font-size: 1rem;
        }

        .form-control {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 3rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            transition: 0.3s;
            outline: none;
        }

        .form-control::placeholder { color: rgba(255,255,255,0.3); }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.1);
        }

        .form-control:focus + i { color: var(--accent); }

        /* --- Terms Row --- */
        .options-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            color: var(--text-light);
        }

        .options-row input {
            accent-color: var(--accent);
            width: 16px; height: 16px;
            margin-top: 3px;
            cursor: pointer;
        }
        
        .options-row a {
            color: var(--primary);
            text-decoration: none;
            transition: 0.3s;
        }
        .options-row a:hover { color: var(--accent); text-decoration: underline; }

        /* --- Submit Button --- */
        .btn-register {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(14, 165, 233, 0.4);
        }

        /* --- Footer Link --- */
        .login-text {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .login-text a {
            color: white;
            font-weight: 700;
            text-decoration: none;
            margin-left: 5px;
            transition: 0.3s;
        }

        .login-text a:hover { color: var(--accent); }

        /* --- Home Button --- */
        .btn-home {
            position: absolute;
            top: 2rem; left: 2rem;
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            display: flex; align-items: center; gap: 8px;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            transition: 0.3s;
            z-index: 20;
        }

        .btn-home:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 1rem;
            justify-content: center;
        }
        .tab {
            padding: 0.6rem 1.5rem;
            background: transparent;
            border: none;
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.3s;
            text-decoration: none;
        }
        .tab:hover { color: white; background: rgba(255,255,255,0.05); }
        .tab.active { background: var(--accent); color: var(--secondary); }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            50% { transform: translate(20px, 20px); }
            100% { transform: translate(0, 0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .btn-home { top: 1rem; left: 1rem; font-size: 0.9rem; }
            .register-container { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>{% load static %}


    <a href="{% url 'home' %}" class="btn-home">
        <i class="fa-solid fa-arrow-left"></i> Home
    </a>

    <div class="register-container">
        {% if user.is_authenticated %}
        <div class="tabs">
            <a href="{% url 'profile' %}" class="tab">Profile</a>
            <a href="{% url 'history' %}" class="tab">History</a>
        </div>
        {% endif %}

        <div class="register-header">
            <div class="logo">
                <i class="fa-solid fa-eye"></i> PharmaSight
            </div>
            <p>Create your account to start verifying medicines.</p>
        </div>

        <form method="POST">
    {% csrf_token %}
 
            <div class="input-group">
               <input type="text" name="username" class="form-control" placeholder="Username" required>
                <i class="fa-regular fa-user"></i>
            </div>

            <div class="input-group">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
                <i class="fa-solid fa-lock"></i>
            </div>

            <div class="input-group">
                <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>
                <i class="fa-solid fa-check-double"></i>
            </div>

            <div class="options-row">
                <input type="checkbox" required id="terms">
                <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</label>
            </div>

            <button type="submit" class="btn-register">
                Create Account <i class="fa-solid fa-user-plus"></i>
            </button>
        </form>

        <div class="login-text">
            Already have an account? <a href="{% url 'login' %}">Login Here</a>
        </div>
    </div>

</body>
</html>
